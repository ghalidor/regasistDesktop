<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      user-select: none;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #ffffff15;
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    p {
      font-size: 13px;
      color: #888;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Regasist Remoto</h2>
  <p>Iniciando aplicación...</p>
</body>
</html>
